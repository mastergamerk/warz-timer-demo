<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarZ Clan Boss Timer - Full Demo Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #06090e; --bg-card: rgba(13, 17, 23, 0.75); --color-primary: #58a6ff; --color-danger: #ff4757; --color-success: #2ed573; --color-warning: #ffd32a; }
        body { font-family: 'Chakra Petch', sans-serif; background-color: var(--bg-main); color: #f0f6fc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-section { display: none; width: 100%; max-width: 1200px; }
        .app-section.active { display: block; }
        .auth-card { background: var(--bg-card); padding: 30px; border-radius: 8px; border-top: 3px solid var(--color-primary); max-width: 400px; margin: 50px auto; }
        .form-control { width: 100%; padding: 12px; background: #070a0e; color: #fff; border: 1px solid #30363d; border-radius: 4px; box-sizing: border-box; margin: 10px 0; }
        .btn-action { padding: 12px; background: #21262d; color: #fff; border: 1px solid #30363d; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-action:hover { background: #30363d; }
        .audio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; width: 100%; }
        .room-box { background: var(--bg-card); padding: 20px; border: 1px solid #30363d; border-radius: 4px; text-align: center; }
        .room-timer { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .spawn-flash { animation: flash 1s infinite; }
        @keyframes flash { 0% { border: 1px solid red; } 50% { border: 1px solid green; } 100% { border: 1px solid red; } }
    </style>
</head>
<body>

    <!-- หน้า Login จำลอง -->
    <div id="loginSection" class="app-section active auth-card">
        <h2>LOGIN (DEMO)</h2>
        <input type="text" id="loginUser" class="form-control" placeholder="ชื่อผู้ใช้">
        <button class="btn-action" onclick="handleLogin()">LOGIN</button>
    </div>

    <!-- หน้า Timer -->
    <div id="mainSection" class="app-section">
        <h1>BOSS TIMER (12 Min Cooldown)</h1>
        <div class="audio-grid">
            <div class="room-box">
                <h4>เสียงเตือน</h4>
                <input type="range" id="volAlert" min="0" max="100" value="50">
            </div>
            <div class="room-box">
                <h4>เพลง YouTube</h4>
                <input type="text" id="ytUrl" class="form-control" placeholder="Link YouTube">
                <button class="btn-action" onclick="loadYT()">เปิดเพลง</button>
                <input type="range" id="volMusic" min="0" max="100" value="40">
                <div style="margin-top:10px;">
                    <button onclick="controlMusic('prev')">⏮️</button>
                    <button onclick="controlMusic('stop')">⏹️</button>
                    <button onclick="controlMusic('next')">⏭️</button>
                </div>
            </div>
        </div>
        <div id="roomsGrid" class="rooms-grid"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let db = JSON.parse(localStorage.getItem('db')) || { boss: {} };
        let ytPlayer = null;

        function handleLogin() {
            localStorage.setItem('user', document.getElementById('loginUser').value);
            showSection('mainSection');
            renderRooms();
        }

        function showSection(id) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderRooms() {
            const grid = document.getElementById('roomsGrid');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++) {
                grid.innerHTML += `
                    <div class="room-box" id="box_${i}">
                        <div class="room-timer" id="timer_${i}">00:00:00</div>
                        <button onclick="spawn(${i})">SPAWN</button>
                        <button onclick="undo(${i})" id="undo_${i}" disabled>UNDO</button>
                    </div>
                `;
            }
        }

        function spawn(i) {
            db.boss[i] = { end: Date.now() + (12 * 60 * 1000), lastReset: 0 };
            localStorage.setItem('db', JSON.stringify(db));
        }

        function undo(i) {
            if(db.boss[i] && (Date.now() - db.boss[i].lastReset < 240000)) {
                db.boss[i].end = db.boss[i].prevEnd;
                saveDB();
            }
        }

        function loadYT() {
            const url = document.getElementById('ytUrl').value;
            const id = url.split('v=')[1]?.substring(0, 11);
            if(!id) return alert("ลิงก์ไม่ถูกต้อง");
            if(!ytPlayer) {
                ytPlayer = new YT.Player('player', { videoId: id });
            } else {
                ytPlayer.loadVideoById(id);
            }
        }

        function controlMusic(act) {
            if(!ytPlayer) return;
            if(act === 'stop') ytPlayer.stopVideo();
            else if(act === 'next') ytPlayer.nextVideo();
            else if(act === 'prev') ytPlayer.previousVideo();
        }

        setInterval(() => {
            const now = Date.now();
            for(let i=1; i<=10; i++) {
                const b = db.boss[i];
                if(!b) continue;
                const timer = document.getElementById(`timer_${i}`);
                const left = b.end - now;
                if(left > 0) {
                    timer.innerText = new Date(left).toISOString().substr(11, 8);
                } else if (left > -50000) {
                    timer.innerText = "บอสเกิดแล้ว!";
                    document.getElementById(`box_${i}`).classList.add('spawn-flash');
                } else {
                    timer.innerText = "00:00:00";
                    document.getElementById(`box_${i}`).classList.remove('spawn-flash');
                }
            }
        }, 1000);
    </script>
</body>
</html>
